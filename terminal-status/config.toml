baseURL = "https://jeffbilder.com/"
languageCode = "en-us"
title = "Jeff Bilder"
theme = "terminal-status"

# Generate RSS + sitemap
[outputs]
  home = ["HTML", "RSS"]

[pagination]
  pagerSize = 8

[params]
  author = "Jeff Bilder"
  username = "jeff"
  tagline = "Cloud Architect · DevOps · SecOps"
  role = "DevOps Manager · Cloud & Infrastructure Leader"
  focus = "multi-region AWS / GovCloud / Azure, automation, secure delivery"
  description = "DevOps and infrastructure leader helping organizations ship faster and sleep better — turning sprawling, fragile systems into automated, observable, and secure platforms, and leading the teams that run them."
  status = "available for engagements"
  avatar = "/me.jpg"

  # Your real handles (used by the contact section + SEO)
  github   = "jeffbildz"
  linkedin = "jjbilder"
  # email  = "you@jeffbilder.com"   # uncomment to add an email button

  # Hero role chips — edit/add freely
  roles = ["cloud_architect", "devops_manager", "infrastructure_manager", "security_operations"]

[markup]
  [markup.highlight]
    style = "github-dark"   # code block theme; matches the dark UI
    noClasses = true
  [markup.goldmark.renderer]
    unsafe = true           # allow raw HTML in markdown posts when you need it
