# .github/workflows/deploy.yml
# GitOps pipeline: every push to `master` builds the Hugo site and deploys it.
# Git is the single source of truth — no manual builds, no dragging files around.

name: Build & Deploy (GitOps)

on:
  push:
    branches: [master]        # change to `main` if you rename your default branch
  workflow_dispatch:          # lets you trigger a manual deploy from the Actions tab

# Least-privilege permissions for the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel older in-flight runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.140.2     # pinned: reproducible builds, no surprise upgrades
    steps:
      - name: Install Hugo (extended)
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo.deb

      - name: Checkout (with theme submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls in your themes/ submodule
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
